<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obra que Cristo efetuou na cruz — Consultas Cristãs</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a3a5c;
      --navy-dark: #102540;
      --navy-mid: #234b6e;
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-pale: rgba(201,168,76,0.15);
      --white: #ffffff;
      --bg: #f5f7fa;
      --text: #1c2b3a;
      --text-muted: #5a6e82;
      --border: rgba(26,58,92,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── LAYOUT GERAL ── */
    .page { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      flex-shrink: 0;
      border-bottom: 2px solid var(--gold);
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold-light); }
    .back-link svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }

    .header-title {
      font-family: 'Crimson Pro', serif;
      font-size: 15px;
      color: var(--white);
      font-style: italic;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .header-badge {
      font-size: 11px;
      color: var(--gold);
      background: var(--gold-pale);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── HERO (mantendo ideia da foto original) ── */
    .hero {
      background: linear-gradient(160deg, #1a3a5c 60%, #0d2540 100%);
      padding: 32px 24px 28px;
      text-align: center;
      border-bottom: 3px solid var(--gold);
    }

    .hero h1 {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 600;
      font-style: italic;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 14px;
      color: var(--gold-light);
      font-style: italic;
      font-family: 'Crimson Pro', serif;
    }

    /* ── NAV DAS PERGUNTAS ── */
    .questions-nav {
      background: var(--navy-mid);
      padding: 0 16px;
    }

    .questions-nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .questions-nav li {
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .questions-nav li:last-child { border-bottom: none; }

    .questions-nav button {
      width: 100%;
      background: none;
      border: none;
      padding: 13px 12px;
      text-align: left;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-family: 'Source Sans 3', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
      line-height: 1.4;
    }

    .questions-nav button:hover {
      color: var(--white);
      background: rgba(255,255,255,0.05);
    }

    .questions-nav button.active {
      color: var(--white);
      background: rgba(201,168,76,0.12);
      border-left: 3px solid var(--gold);
    }

    .q-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      background: rgba(201,168,76,0.15);
      border-radius: 4px;
      padding: 2px 7px;
      flex-shrink: 0;
    }

    /* ── ÁREA DE CONTEÚDO / IFRAME ── */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Placeholder inicial */
    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
    }

    .placeholder-icon {
      width: 52px;
      height: 52px;
      background: rgba(26,58,92,0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .placeholder-icon svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: var(--navy);
      stroke-width: 1.5;
      opacity: 0.5;
    }

    .placeholder h3 {
      font-family: 'Crimson Pro', serif;
      font-size: 1.1rem;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .placeholder p {
      font-size: 13px;
      max-width: 280px;
      line-height: 1.6;
    }

    /* Container do iframe */
    .iframe-container {
      flex: 1;
      display: none;
      flex-direction: column;
    }

    .iframe-container.visible {
      display: flex;
    }

    .iframe-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .iframe-question-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      flex: 1;
      line-height: 1.3;
    }

    .iframe-nav-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .iframe-nav-btns button {
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Source Sans 3', sans-serif;
      transition: background 0.2s;
    }

    .iframe-nav-btns button:hover { background: var(--navy-mid); }
    .iframe-nav-btns button:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      min-height: 400px;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--navy-dark);
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    /* ── DESKTOP (tela larga) ── */
    @media (min-width: 768px) {
      header { height: 60px; padding: 0 32px; }

      .hero { padding: 36px 32px 32px; }

      .main-layout {
        display: flex;
        flex: 1;
      }

      .sidebar {
        width: 300px;
        flex-shrink: 0;
        background: var(--navy-mid);
        display: flex;
        flex-direction: column;
      }

      .sidebar-title {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.4);
        padding: 16px 16px 8px;
        font-weight: 600;
      }

      .questions-nav { padding: 0; background: transparent; }

      .questions-nav button {
        padding: 14px 16px;
        font-size: 13px;
      }

      .content-area {
        flex: 1;
        border-left: 1px solid var(--border);
      }

      iframe { min-height: 500px; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Estudos
    </a>
    <div class="header-title">Consultas Cristãs</div>
    <div class="header-badge">Estudo bíblico</div>
  </header>

  <div class="hero">
    <h1>A importância do conhecimento da palavra de Deus?</h1>
    <p>E como conhecê-la se aprocimando do Pai</p>
  </div>

  <!-- Layout adaptável: mobile empilha, desktop coloca lado a lado -->
  <div class="main-layout" style="display:flex;flex:1;flex-direction:column;">

    <!-- Sidebar / nav de perguntas -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-title" style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:14px 16px 8px;font-weight:600;">Escolha uma pergunta</div>
      <nav class="questions-nav">
        <ul id="nav-list">
          <li>
            <button onclick="openQuestion(0)" id="btn-0">
              <span class="q-num">1</span>
              O que eu faço para ter conhecimento da palavra de Deus?
            </button>
          </li>
          <li>
            <button onclick="openQuestion(1)" id="btn-1">
              <span class="q-num">2</span>
              Por que é importante o conhecimento sobre a palavra de Deus?
            </button>
          </li>
          <li>
            <button onclick="openQuestion(2)" id="btn-2">
              <span class="q-num">3</span>
              E tendo o conhecimento da palavra de Deus, como será a minha conduta neste mundo em trevas?
            </button>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Área principal -->
    <div class="content-area" id="content-area">

      <!-- Placeholder inicial -->
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">
         <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> 
        </div>
        <h3>Escolha uma das perguntas</h3>
        <p>Selecione uma das perguntas ao lado para começar o estudo.</p>
      </div>

      <!-- Iframe container -->
      <div class="iframe-container" id="iframe-container">
        <div class="iframe-header">
          <div class="iframe-question-title" id="iframe-title"></div>
          <div class="iframe-nav-btns">
            <button id="btn-prev" onclick="navigate(-1)">← Anterior</button>
            <button id="btn-next" onclick="navigate(1)">Próximo →</button>
          </div>
        </div>
        <iframe id="content-frame" src="" title="Conteúdo do estudo"></iframe>
      </div>

    </div>
  </div>

  <footer>©IrmãosemCristo — Consulta Cristã</footer>
</div>

<script>
  // ─────────────────────────────────────────
  // COLOQUE AQUI OS SEUS LINKS para cada pergunta
  // ─────────────────────────────────────────
  const perguntas = [
    {
      titulo: "1.O que eu faço para ter conhecimento da palavra de Deus?",
      url: "index07.html"   // ← coloque o link da pergunta 1 aqui
    },
    {
      titulo: "2.Por que é importante o conhecimento sobre a palavra de Deus?",
      url: "index08.html"   // ← coloque o link da pergunta 2 aqui
    },
    {
      titulo: "3.E tendo o conhecimento da palavra de Deus, como será a minha conduta neste mundo em trevas?",
      url: "index09.html"   // ← coloque o link da pergunta 3 aqui
    }
  ];
  // ───────────────────────────────────────── <a href="index07.html" target="frame">1.O que eu faço para ter conhecimento da palavra de Deus?</a>
            //<a href="index08.html" target="frame">2.Por que é importante o conhecimento sobre a palavra de Deus?</a>
           // <a href="index09.html" target="frame">3.E tendo o conhecimento da palavra de Deus, como será a minha conduta neste mundo em trevas?</a>

  let atual = -1;

  function openQuestion(idx) {
    atual = idx;
    const p = perguntas[idx];

    // Atualiza nav ativa
    document.querySelectorAll('.questions-nav button').forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });

    // Atualiza iframe
    document.getElementById('iframe-title').textContent = p.titulo;
    document.getElementById('content-frame').src = p.url;

    // Mostra iframe, esconde placeholder
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('iframe-container').classList.add('visible');

    // Atualiza botões anterior/próximo
    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === perguntas.length - 1;

    // Mobile: rola para o conteúdo
    if (window.innerWidth < 768) {
      document.getElementById('content-area').scrollIntoView({ behavior: 'smooth' });
    }
  }

  function navigate(dir) {
    const novo = atual + dir;
    if (novo >= 0 && novo < perguntas.length) openQuestion(novo);
  }

  // Layout responsivo: empilha no mobile, lado a lado no desktop
  function ajustarLayout() {
    const main = document.querySelector('.main-layout');
    if (window.innerWidth >= 768) {
      main.style.flexDirection = 'row';
    } else {
      main.style.flexDirection = 'column';
    }
  }
  ajustarLayout();
  window.addEventListener('resize', ajustarLayout);
</script>
</body>
</html>
